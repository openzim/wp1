# Run Python unit tests in continuous integration mode.
name: Continuous Integration

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main

jobs:
  black-format-check:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14.4
        uses: actions/setup-python@v5
        with:
          python-version: '3.14.4'

      - name: Install Black
        # Install the exact version from Pipfile.lock so CI and local
        # formatting can never disagree.
        run: |
          pip install --upgrade pip
          pip install "black==$(jq -r '.develop.black.version | ltrimstr("==")' Pipfile.lock)"

      - name: Check formatting with Black
        run: |
          black --check --diff .

  ty-type-check:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14.4
        uses: actions/setup-python@v5
        with:
          python-version: '3.14.4'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pipenv
          pipenv install --deploy --dev

      - name: Run ty
        run: ./check_types.sh

  python-tests:
    runs-on: ubuntu-24.04

    services:
      # Unit test rely on a local MySQL instance with an empty root password.
      mysql:
        image: mariadb:10.4
        env:
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: yes
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5

      redis:
        # Some unit tests also try to write to Redis
        image: redis
        ports:
          - 9777:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4
        # Don't need lfs because we're not referencing the dev-db in this workflow.

      - name: Set up Python 3.14.4
        uses: actions/setup-python@v5
        with:
          python-version: '3.14.4'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pipenv
          pipenv install --system --deploy --ignore-pipfile --dev

      - name: Verify MySQL connection from host
        run: |
          mysql --host 127.0.0.1 --port 3306 -uroot -e "SHOW DATABASES"

      - name: Create test databases
        run: |
          mysql --host 127.0.0.1 --port 3306 -uroot -e 'CREATE DATABASE enwp10_test; CREATE DATABASE enwikip_test;'

      - name: Copy credentials
        run: |
          cp wp1/credentials.py.e2e wp1/credentials.py
          cp wp1/credentials.py.dev.e2e wp1/credentials.py.dev

      - name: Test with pytest, with coverage
        run: |
          pipenv run pytest --cov --cov-config=.coveragerc --cov-report=xml

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  frontend-cypress:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Get yarn cache directory path
        id: yarn-dep-cache-dir-path
        run: cd wp1-frontend && echo "YARN_CACHE_DIR=$(yarn cache dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        name: Setup Yarn dep cache
        id: yarn-dep-cache
        with:
          path: ${{ steps.yarn-dep-cache-dir-path.outputs.YARN_CACHE_DIR }}
          key: ${{ runner.os }}-yarn-dep-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-dep-

      - name: Install Javascript dependencies
        run: cd wp1-frontend && yarn install --frozen-lockfile

      - name: Copy credentials
        run: |
          cp wp1/credentials.py.e2e wp1/credentials.py
          cp wp1/credentials.py.dev.e2e wp1/credentials.py.dev

      - uses: docker/setup-buildx-action@v4

      - name: Build Docker images (with layer cache)
        uses: docker/bake-action@v7
        with:
          source: .
          files: docker-compose-dev.yml
          targets: |
            dev-database
            dev-workers
            dev-web
          load: true
          set: |
            dev-database.cache-from=type=gha,scope=dev-database
            dev-database.cache-to=type=gha,scope=dev-database,mode=max
            dev-workers.cache-from=type=gha,scope=dev-workers
            dev-workers.cache-to=type=gha,scope=dev-workers,mode=max
            dev-web.cache-from=type=gha,scope=dev-web
            dev-web.cache-to=type=gha,scope=dev-web,mode=max

      # This is the dev database, the dev redis, the dev workers, the dev
      # minio and the dev web server (Flask, port 5000). The dev-frontend
      # container is deliberately not started: the tests run against the
      # built frontend bundle, served below on port 5173.
      - name: Start Docker dev services
        run: |
          docker compose -f docker-compose-dev.yml up -d --no-build \
            redis dev-database minio createbuckets dev-workers dev-web

      - name: Build frontend server
        run: |
          cd wp1-frontend
          yarn build --mode staging

      - name: Start frontend server
        run: |
          cd wp1-frontend
          python3 -m http.server 5173 --directory dist/ &

      - name: Wait for API and frontend server to be up
        run: |
          timeout 120 bash -c \
            'until curl -sf http://localhost:5000/v1/projects/count > /dev/null; do sleep 2; done'
          timeout 30 bash -c \
            'until curl -sf http://localhost:5173/ > /dev/null; do sleep 1; done'

      - name: Run frontend tests
        run: |
          cd wp1-frontend
          $(yarn bin)/cypress run

      - uses: actions/upload-artifact@v4
        continue-on-error: true
        if: always()
        with:
          name: screenshots
          path: |
            wp1-frontend/cypress/screenshots/*
            output.log
